name: 🤖 CI/CD Pipeline

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Tester (TDD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Kör alla tester
        run: npm test -- --reporter=verbose
      - name: Ladda upp testresultat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/

  security:
    name: 🔒 Säkerhetsskanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Granska paket för säkerhetshål
        run: npm audit --audit-level=high

  build:
    name: 🏗️ Bygg & Deploy
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Bygg produktionsapp
        run: npm run build
      - name: Deploya till GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
