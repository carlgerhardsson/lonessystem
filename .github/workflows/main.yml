name: 🤖 CI/CD Pipeline

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:

  # ── 1. VALIDERA KONFIGURATION ─────────────────────────────────────────────
  validate:
    name: ✅ Validera konfigfiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Kontrollera att kritiska filer finns
        run: |
          files=(
            "package.json"
            "vite.config.ts"
            "tsconfig.json"
            "tailwind.config.js"
            "postcss.config.js"
            "index.html"
            "src/main.tsx"
            "src/App.tsx"
            "src/engine/calculations.ts"
            "src/store/index.ts"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Saknas: $f"
              missing=1
            else
              echo "✅ Finns: $f"
            fi
          done
          exit $missing

      - name: Kontrollera postcss.config.js innehåll
        run: |
          if ! grep -q "tailwindcss" postcss.config.js; then
            echo "❌ postcss.config.js saknar tailwindcss"
            exit 1
          fi
          if ! grep -q "autoprefixer" postcss.config.js; then
            echo "❌ postcss.config.js saknar autoprefixer"
            exit 1
          fi
          echo "✅ postcss.config.js ser korrekt ut"

  # ── 2. TESTER ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tester (TDD)
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installera beroenden
        run: npm install
      - name: Kör alla tester
        run: npm test
      - name: Ladda upp coverage-rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-rapport
          path: coverage/

  # ── 3. BYGGVALIDERING ─────────────────────────────────────────────────────
  build-check:
    name: 🔨 Byggvalidering
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Bygg produktionsapp
        run: npm run build
      - name: Verifiera att dist/ skapades
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "❌ dist/index.html saknas"
            exit 1
          fi
          echo "✅ Bygget lyckades"
          ls -la dist/

  # ── 4. SÄKERHETSSKANNING ──────────────────────────────────────────────────
  security:
    name: 🔒 Säkerhetsskanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm audit --audit-level=high
        continue-on-error: true

  # ── 5. DEPLOY ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy till GitHub Pages
    needs: [test, build-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - name: Deploya till GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
      - name: Sammanfattning
        run: |
          echo "## 🚀 Deploy klar!" >> $GITHUB_STEP_SUMMARY
          echo "Live: https://carlgerhardsson.github.io/lonessystem/" >> $GITHUB_STEP_SUMMARY
